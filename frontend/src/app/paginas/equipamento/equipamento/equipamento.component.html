<div class="container">
  <h2>Cadastro de Categorias de Equipamento</h2>

  <form [formGroup]="formCategoria" (ngSubmit)="salvar()" class="formulario">
    <label for="nome">Nome da categoria:</label>
    <input id="nome" type="text" formControlName="nome" />

    <div class="botoes">
      <button type="submit">
        {{ editando ? 'Atualizar' : 'Adicionar' }}
      </button>
      <button *ngIf="editando" type="button" (click)="cancelar()">Cancelar</button>
    </div>
  </form>

  <hr class="espaco" />

  <table class="tabela">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of categorias">
        <td>{{ cat.id }}</td>
        <td>{{ cat.nome }}</td>
        <td>
          <button (click)="editar(cat)">Editar</button>
          <button (click)="excluir(cat.id)">Excluir</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
