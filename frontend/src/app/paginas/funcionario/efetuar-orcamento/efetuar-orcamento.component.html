<div class="m-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Efetuar Orçamento</h2>
        </div>
        <main class="col-md-12 col-lg-12 px-md-4">
            <section class="sessao_corpo">
                <h2 class="sessao_corpo_titulo">Pedido XXX:</h2>
                <div class="row">
                    <div class="col-md-1">
                    </div>
                    <div class="col-md-4">
                        <form>
                            <input type="number" id="orcamento_valor" class="form-control" placeholder="Valor do Orçamento" #valorOrcamento>
                        </form>
                    </div>


                </div>
                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-primary" 
                    (click)="processarOrcamento(+valorOrcamento.value)"
                    >Registrar</button>
                </div>

            </section>
        </main>
</div>
