<app-navbar-funcionario></app-navbar-funcionario>
<div class="container-fluid bg-body-secondary">
    <div class="row">
        <main class="col-md-12 col-lg-12 px-md-4">
            <div
                class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Bem vindo(a) Funcionario !</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                </div>
            </div>
            <section class="sessao_corpo">
                <h2 class="sessao_corpo_titulo">Efetuar orçamento do pedido XXX:</h2>
                <div class="row">
                    <div class="col-md-1">
                    </div>
                    <div class="col-md-4">
                        <form>
                            <input type="number" id="orcamento_valor" class="form-control" placeholder="Valor do Orçamento" #valorOrcamento>
                        </form>
                    </div>


                </div>
                <div class="d-flex justify-content-center">
                    <button type="submit" class="btn btn-primary" 
                    (click)="processarOrcamento(+valorOrcamento.value)"
                    >Registrar</button>
                </div>

            </section>
        </main>
    </div>
</div>
