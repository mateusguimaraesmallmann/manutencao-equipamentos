<div class="container mt-4">

  <div class="aprovar__conteudo">
    <p><strong>Equipamento:</strong> Notebook Dell XPS 13</p>
    <p><strong>Categoria:</strong> Notebook</p>
    <p><strong>Defeito:</strong> Não liga após carregar</p>
