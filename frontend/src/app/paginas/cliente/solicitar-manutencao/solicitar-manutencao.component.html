<app-navbar-cliente></app-navbar-cliente>
<div class="container-fluid bg-body-secondary">
    <div class="row">
        <main class="col-md-12 col-lg-12 px-md-4">
            <div
                class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Bem vindo(a) Fulano !</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                </div>
            </div>
            <section class="sessao_corpo">
                <h2 class="sessao_corpo_titulo">Registrar nova solicitação:</h2>
                <div class="row">
                    <div class="col-md-1">
                    </div>
                    <div class="col-md-4">
                        <form>
                            Categoria do equipamento:
                            <br>
                            <select class="form-select" #categoria>
                                <option value="">Selecione</option>
                                <option value="Notebook">Notebook</option>
                                <option value="Desktop">Desktop</option>
                                <option value="Impressora">Impressora</option>
                                <option value="Mouse">Mouse</option>
                                <option value="Teclado">Teclado</option>
                            </select>
                        </form>
                    </div>

                    <div class="col-md-1">
                    </div>
                    <div class="col-md-5">
                        <form>
                            Descrição do problema:
                            <br>
                            <textarea rows="4" class="form-control" #descricao_problema
                             ng-model="descricao_problema" ng-form></textarea>
                        </form>
                    </div>
                    <div class="col-md-1"></div>

                </div>
                <div class="d-flex justify-content-center">
                    <button type="button" class="btn btn-primary" 
                    (click)="processarSolicitacao(descricao_problema.value, categoria.value)"
                    >Registrar</button>
                </div>
            </section>
        </main>
    </div>
</div>
