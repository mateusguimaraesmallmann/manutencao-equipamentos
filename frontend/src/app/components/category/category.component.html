<div class="m-3">
	<div class="d-flex justify-content-between align-items-center mb-3">
		<h2>Categorias</h2>
		<button class="btn btn-primary" (click)="openModal(false)">Nova Categoria</button>
	</div>

	<!-- Tabela -->
	<table class="table table-striped">
		<thead>
			<tr>
				<th>ID</th>
				<th>Nome</th>
				<th>Ações</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngIf="categories.length === 0">
				<td colspan="100%" class="text-center">Nenhuma categoria cadastrada</td>
			</tr>
			<tr *ngFor="let category of categories">
				<td>{{ category.id }}</td>
				<td>{{ category.name }}</td>
				<td>
					<button class="btn btn-info me-2" (click)="openModal(true, category)">Editar</button>
					<button class="btn btn-danger" (click)="deleteCategory(category.id)">Excluir</button>
				</td>
			</tr>
		</tbody>
	</table>

	<!-- Modal -->
	<div class="modal fade" id="categoryModal" tabindex="-1" aria-labelledby="categoryModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<form (ngSubmit)="saveCategory()">
					<div class="modal-header">
						<h5 class="modal-title" id="categoryModalLabel">
							{{ editMode ? 'Editar Categoria' : 'Nova Categoria' }}
						</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
					</div>
					<div class="modal-body">
						<div class="mb-3">
							<label class="form-label">Nome</label>
							<input [(ngModel)]="categoryForm.name" name="name" class="form-control" required />
						</div>
					</div>
					<div class="modal-footer">
						<button type="submit" class="btn btn-success">
							{{ editMode ? 'Atualizar' : 'Salvar' }}
						</button>
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
